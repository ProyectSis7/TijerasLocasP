            100% { transform: scale(1); opacity: 1; }
        }
        .animate-scale-in {
            animation: scale-in 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
    </style>

<style>
    body {
      min-height: max(884px, 100dvh);
    }

  </head>
<body class="bg-background text-on-surface min-h-screen flex flex-col items-center justify-center p-gutter">
<!-- Confirmation Canvas -->
<main class="w-full max-w-md flex flex-col items-center text-center space-y-md animate-scale-in">
<!-- Success Icon -->
<div class="relative w-32 h-32 flex items-center justify-center rounded-full bg-surface-container-high border border-primary/20 check-glow mb-md">
<span class="material-symbols-outlined text-primary text-[64px]" style="font-variation-settings: 'FILL' 1;">
                check_circle
            </span>
<div class="absolute inset-0 rounded-full border-2 border-primary/10 animate-ping opacity-25"></div>
</div>
<!-- Success Message -->
<div class="space-y-xs">
<h1 class="font-headline-md text-headline-md-mobile text-primary tracking-tight">¡Cita agendada con éxito!</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Tu lugar está reservado en Tijeras Locas.</p>
</div>
<!-- Appointment Summary Bento Card -->
<div class="w-full bg-surface-container border border-outline-variant/30 rounded-xl p-md mt-lg text-left space-y-sm backdrop-blur-md">
<div class="flex items-center justify-between border-b border-outline-variant/20 pb-sm">
<span class="font-label-caps text-label-caps text-on-surface-variant">RESUMEN</span>
<span class="font-label-caps text-label-caps text-primary">#TL-9283</span>
</div>
<div class="grid grid-cols-2 gap-md pt-base">
<div class="space-y-1">
<p class="font-label-caps text-[10px] text-outline uppercase tracking-widest">Servicio</p>
<p class="font-body-md text-body-md font-bold text-on-surface">Corte de pelo</p>
</div>
<div class="space-y-1">
<p class="font-label-caps text-[10px] text-outline uppercase tracking-widest">Barbero</p>
<p class="font-body-md text-body-md font-bold text-on-surface">Andrés</p>
</div>
<div class="space-y-1">
<p class="font-label-caps text-[10px] text-outline uppercase tracking-widest">Fecha</p>
<p class="font-body-md text-body-md font-bold text-on-surface">15 de Octubre</p>
</div>
<div class="space-y-1">
<p class="font-label-caps text-[10px] text-outline uppercase tracking-widest">Hora</p>
<p class="font-body-md text-body-md font-bold text-on-surface">10:00 AM</p>
</div>
</div>
</div>
<!-- Dynamic Map Hint -->
<div class="w-full h-24 rounded-xl overflow-hidden relative border border-outline-variant/20 group">
<img class="w-full h-full object-cover brightness-50 contrast-125 group-hover:scale-105 transition-transform duration-700" data-alt="A stylized minimalist dark themed map showing a single golden pin pointing to a luxury barbershop location in a high-end urban neighborhood. The map features deep charcoal and black tones with golden highlights for major roads. The atmosphere is sophisticated and reflects a premium navigation experience in a modern digital application." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCcWQ0JeKIRoosgy7QNh0OSVgogl61gsOoICsCayUiZe24NrpiLQAnMMXxLGbKHSF8QRZ2wNc_kGemG2qL9YZwRJjaUm8QzFcXSDVa_xaeL_mhldUTnbgFSNBvGRnUBjAsMjr34kxrpgApo6nP_LbN6dsRvhmLCY19g-IS0vT95wuZxZgY4BZKTtMvGBxnjqkbZEmq-uOQsBt-qJgLAkYV2piBahqsTVzUUAXlDGr-Ig1VfA_HawOYE4Jh4QNVQYsn_l9w-QqiG1Kc"/>
<div class="absolute inset-0 bg-gradient-to-t from-surface-container-lowest to-transparent flex items-end p-sm">
<p class="font-label-caps text-[11px] text-on-surface flex items-center gap-xs">
<span class="material-symbols-outlined text-[14px]">location_on</span>
                    Calle de la Elegancia, 12, Ciudad
                </p>
</div>
</div>
<!-- Action Buttons -->
<div class="w-full flex flex-col gap-sm pt-md">
<button class="w-full py-md rounded-lg bg-primary-container text-on-primary font-button uppercase tracking-widest shadow-lg active:scale-95 transition-all duration-150 flex items-center justify-center gap-sm">
<span class="material-symbols-outlined text-[18px]">calendar_add_on</span>
                Añadir a Calendario
            </button>
<button class="w-full py-md rounded-lg border border-primary text-primary font-button uppercase tracking-widest active:scale-95 transition-all duration-150 flex items-center justify-center gap-sm bg-transparent">
<span class="material-symbols-outlined text-[18px]">home</span>
                Volver al Inicio
            </button>
</div>
<!-- Decorative Element -->
<p class="pt-lg font-body-md text-[13px] text-outline italic">
            Te hemos enviado un recordatorio por correo electrónico.
        </p>
</main>
<!-- Bottom Spacing for Mobile Home Bar -->
<div class="h-base"></div>
<script>
        // Micro-interaction for buttons
        document.querySelectorAll('button').forEach(button => {
            button.addEventListener('mousedown', () => {
                button.style.opacity = '0.8';
            });
            button.addEventListener('mouseup', () => {
                button.style.opacity = '1';
            });
        });

        // Simple animation trigger for the summary card
        window.addEventListener('DOMContentLoaded', () => {
            const card = document.querySelector('.bg-surface-container');
            card.style.opacity = '0';
            card.style.transform = 'translateY(20px)';
            setTimeout(() => {
                card.style.transition = 'all 0.8s ease-out';
                card.style.opacity = '1';
                card.style.transform = 'translateY(0)';
            }, 300);
        });
    </script>
</body></html>
