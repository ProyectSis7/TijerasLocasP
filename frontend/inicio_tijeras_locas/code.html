<script>
        // Simple interaction for buttons
        document.querySelectorAll('button, a').forEach(el => {
            el.addEventListener('click', (e) => {
                if (el.tagName === 'A') e.preventDefault();
                console.log('Action triggered:', el.innerText || 'Navigation Item');
            });
        });

        // Dynamic greeting based on time of day (optional enhancement)
        window.onload = () => {
            const now = new Date();
            const hour = now.getHours();
            let greeting = "Bienvenido";
            if (hour < 12) greeting = "Buenos días";
            else if (hour < 20) greeting = "Buenas tardes";
            else greeting = "Buenas noches";
            
            console.log(`${greeting} a Tijeras Locas`);
        };
